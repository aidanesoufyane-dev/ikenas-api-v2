                  type: string
                  description: 'targetClass field.'
                targetClasses:
                  type: string
                  description: 'targetClasses field.'
                targetUser:
                  type: string
                  description: 'targetUser field.'
                targetUsers:
                  type: string
                  description: 'targetUsers field.'
